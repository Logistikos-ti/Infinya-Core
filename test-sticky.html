<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sticky Test</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden relative h-screen">
    <header class="h-24 bg-gray-200 shrink-0">Header</header>
    <div class="flex-1 overflow-y-auto px-4 pb-24 scroll-smooth">
      <div class="space-y-6">
        <section class="flex flex-col gap-6 w-full">
          <form class="flex flex-col flex-1 h-full w-full">
            <div class="grid grid-cols-1 lg:grid-cols-[1fr_340px] gap-6 pb-20 relative">
              <div class="flex flex-col gap-5 min-w-0 h-[2000px] bg-red-100">
                Tall content
              </div>
              <div class="w-full shrink-0 sticky top-6 self-start flex flex-col gap-4 bg-blue-200 h-64">
                Sticky Sidebar
              </div>
            </div>
            <div class="sticky bottom-0 z-40 bg-green-200 h-16">
              Sticky Footer
            </div>
          </form>
        </section>
      </div>
    </div>
  </div>
</body>
</html>
