name: Sync Bling XML

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger protected sync endpoint
        env:
          WMS_BASE_URL: ${{ secrets.WMS_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$WMS_BASE_URL" ]; then
            echo "Missing secret: WMS_BASE_URL"
            exit 1
          fi

          if [ -z "$CRON_SECRET" ]; then
            echo "Missing secret: CRON_SECRET"
            exit 1
          fi

          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${WMS_BASE_URL%/}/api/cron/sync-bling-xml"
